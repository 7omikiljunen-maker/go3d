<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>3D Go</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: sans-serif; overflow: hidden; }
    #app { width: 100vw; height: 100vh; height: 100dvh; position: relative; }
    canvas { width: 100%; height: 100%; display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }

    #top-ui {
      position: absolute; top: 10px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 7px; flex-wrap: wrap; padding: 0 8px;
    }
    .pill {
      background: rgba(255,255,255,0.12);
      border: 0.5px solid rgba(255,255,255,0.2);
      border-radius: 20px; padding: 5px 14px;
      font-size: 13px; color: #fff;
    }
    #turn { font-weight: 500; }
    #score { color: rgba(255,255,255,0.8); }

    #left-panel {
      position: absolute; top: 48px; left: 10px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .panel-label {
      font-size: 10px; color: rgba(255,255,255,0.45);
      letter-spacing: .5px; margin-bottom: 2px;
    }
    #layers { display: flex; flex-direction: column; gap: 3px; }

    #right-panel {
      position: absolute; top: 48px; right: 10px;
      display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
    }
    .btn-group { display: flex; gap: 4px; }
    .ctrl-btn {
      background: rgba(255,255,255,0.1);
      border: 0.5px solid rgba(255,255,255,0.25);
      border-radius: 10px; padding: 4px 10px;
      font-size: 11px; cursor: pointer; color: #fff;
    }
    .ctrl-btn.active {
      background: rgba(100,160,255,0.3);
      border-color: rgba(100,160,255,0.6);
    }
    #scoringBtn {
      background: rgba(255,255,255,0.1);
      border: 0.5px solid rgba(255,255,255,0.25);
      border-radius: 12px; padding: 4px 12px;
      font-size: 11px; cursor: pointer; color: #fff;
    }

    #bottom-ui {
      position: absolute; bottom: 10px; left: 0; right: 0;
      bottom: max(10px, env(safe-area-inset-bottom, 10px) + 8px);
      display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .action-btn {
      background: rgba(255,255,255,0.1);
      border: 0.5px solid rgba(255,255,255,0.25);
      border-radius: 20px; padding: 6px 16px;
      font-size: 13px; cursor: pointer; color: #fff;
    }
    #aiBtn {
      background: rgba(80,200,120,0.2);
      border: 0.5px solid rgba(80,200,120,0.5);
      color: #aef5c0; font-weight: 500;
      display: none;
    }

    #overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(10,10,25,0.88);
      align-items: center; justify-content: center;
      z-index: 20; flex-direction: column;
    }
    #overlay-box {
      background: rgba(30,30,60,0.98);
      border: 0.5px solid rgba(255,255,255,0.2);
      border-radius: 16px; padding: 28px 36px;
      text-align: center; color: #fff; min-width: 260px;
    }
    #overlayTitle { font-size: 18px; font-weight: 500; margin-bottom: 16px; }
    #overlayBody { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.9; }
    #overlayClose {
      margin-top: 18px;
      background: rgba(255,255,255,0.12);
      border: 0.5px solid rgba(255,255,255,0.25);
      border-radius: 20px; padding: 7px 22px;
      font-size: 13px; cursor: pointer; color: #fff;
    }
  </style>
  <script type="module" crossorigin src="/go3d/assets/index-CUVnYZfj.js"></script>
</head>
<body>
  <div id="app">
    <canvas id="c"></canvas>

    <div id="top-ui">
      <div id="turn" class="pill">⚫ Black's turn</div>
      <div id="score" class="pill">Black: 0 | White: 0</div>
    </div>

    <div id="left-panel">
      <div class="panel-label">LAYERS</div>
      <div id="layers"></div>
    </div>

    <div id="right-panel">
      <div class="panel-label">BOARD</div>
      <div class="btn-group" id="sizeButtons">
        <button class="ctrl-btn" data-size="3">3³</button>
        <button class="ctrl-btn active" data-size="5">5³</button>
        <button class="ctrl-btn" data-size="7">7³</button>
      </div>
      <div class="panel-label" style="margin-top:2px">MODE</div>
      <div class="btn-group" id="modeButtons">
        <button class="ctrl-btn" data-mode="pvp">PvP</button>
        <button class="ctrl-btn active" data-mode="pvc">PvC</button>
        <button class="ctrl-btn" data-mode="cvc">CvC</button>
      </div>
      <div class="panel-label" style="margin-top:2px">SCORING</div>
      <button id="scoringBtn">Captures + territory</button>
    </div>

    <div id="bottom-ui">
      <button class="action-btn" id="passBtn">Pass</button>
      <button class="action-btn" id="aiBtn">Computer move ▶</button>
      <button class="action-btn" id="resetBtn">New game</button>
    </div>

    <div id="overlay">
      <div id="overlay-box">
        <div id="overlayTitle"></div>
        <div id="overlayBody"></div>
        <button id="overlayClose">New game</button>
      </div>
    </div>
  </div>

</body>
</html>
